# PhaseForensics Default Configuration

# DT-CWT Parameters
dtcwt:
  nlevels: 5                    # Decomposition levels (3-7)
  biort: 'near_sym_b'          # Biorthogonal wavelet
  qshift: 'qshift_b'           # Quarter-shift wavelet
  ndirs: 6                      # Number of directions (fixed for DT-CWT)

# Phase Coherence Metrics
metrics:
  ispc:
    enabled: true
    circular_variance: true     # Use circular variance
    scales: [1, 2, 3, 4]       # Scale pairs for inter-scale coherence
  cdpgc:
    enabled: true
    gradient_method: 'sobel'    # 'sobel' or 'finite_diff'
    patch_size: 16              # Local patch size for gradient consistency

# GGD Fitting
ggd:
  method: 'mle'                 # 'mle' or 'mom' (method of moments)
  initial_beta: 1.0             # Initial shape parameter
  max_iter: 100                 # MLE optimization iterations
  fallback_beta: 1.0            # Fallback if fitting fails (Laplacian)

# Detection
detection:
  method: 'neyman_pearson'      # 'neyman_pearson', 'gmm', 'kde', 'emd'
  fpr_targets: [0.01, 0.05, 0.10]  # Target false positive rates
  combine_method: 'fisher_lda'  # How to combine ISPC and CDPGC scores

# Data
data:
  base_path: /mnt/storage/datasets
  real_calibration:
    sources:
      - '/mnt/storage/datasets/DeepfakeDetection/Image/FFHQ/images/'
    n_samples: 5000
  image_size: null              # null = original size
  real:
    ffhq: /mnt/storage/datasets/DeepfakeDetection/Image/FFHQ/images/
  fake:
    sd_v1.1: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/CompVis-stable-diffusion-v1-1-ViT-L-14-openai/
    sd_v1.5: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/runwayml-stable-diffusion-v1-5-ViT-L-14-openai/
    sd_v2.1: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/stabilityai-stable-diffusion-2-1-base-ViT-H-14-laion2b_s32b_b79k/
    kandinsky_2.1: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/kandinsky-community-kandinsky-2-1-ViT-L-14-openai/
    midjourney_v4: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/midjourney-v4/
    midjourney_v5: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/midjourney-v5/
    midjourney_v5.1: /mnt/storage/datasets/DeepfakeDetection/AI_Generated/midjourney-v5-1/

# Pilot Study
pilot_study:
  n_samples: 100
  target_size: [256, 256]
  go_threshold: 0.5
  go_min_generators: 5
  total_generators: 7
  compression_test:
    enabled: true
    quality_factors: [95, 85, 75, 50]

# Evaluation
eval:
  metrics: ['auroc', 'ap', 'tpr_at_fpr']
  tpr_fpr_thresholds: [0.01, 0.05]

# Processing
processing:
  num_workers: 8                # Multiprocessing workers
  batch_size: 64                # Images per batch (for data loading)
  target_size: [256, 256]
  normalize: true

# Notification
notification:
  enabled: true
  email: sjals93@gmail.com
  smtp_server: smtp.gmail.com
  smtp_port: 587

# Output
output:
  save_maps: true               # Save ISPC/CDPGC spatial maps
  save_histograms: true         # Save feature histograms
  save_ggd_params: true         # Save fitted GGD parameters
